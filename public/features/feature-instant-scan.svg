  <rect x="242" y="334" width="296" height="18" fill="rgba(0,0,0,0.18)"/>
  <rect x="242" y="372" width="240" height="14" fill="rgba(0,0,0,0.14)"/>
  <rect x="242" y="408" width="260" height="14" fill="rgba(0,0,0,0.12)"/>
  <rect x="242" y="444" width="220" height="14" fill="rgba(0,0,0,0.1)"/>

  <!-- checklist -->
  <g opacity="0.92">
    <rect x="242" y="498" width="24" height="24" fill="url(#sand)" stroke="rgba(0,0,0,0.22)" stroke-width="6"/>
    <rect x="282" y="504" width="220" height="12" fill="rgba(0,0,0,0.14)"/>
    <rect x="242" y="552" width="24" height="24" fill="url(#sand)" stroke="rgba(0,0,0,0.22)" stroke-width="6"/>
    <rect x="282" y="558" width="180" height="12" fill="rgba(0,0,0,0.12)"/>
    <rect x="242" y="606" width="24" height="24" fill="url(#sand)" stroke="rgba(0,0,0,0.22)" stroke-width="6"/>
    <rect x="282" y="612" width="200" height="12" fill="rgba(0,0,0,0.11)"/>
  </g>

  <!-- magnifier -->
  <circle cx="690" cy="520" r="128" fill="rgba(255,255,255,0.35)" stroke="rgba(0,0,0,0.3)" stroke-width="14"/>
  <circle cx="690" cy="520" r="96" fill="rgba(184,225,255,0.25)" stroke="rgba(0,0,0,0.18)" stroke-width="10"/>
