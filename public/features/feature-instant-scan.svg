<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8E1FF"/>
      <stop offset="0.55" stop-color="#E8F3FF"/>
      <stop offset="1" stop-color="#E9D9BF"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F4EAD8"/>
      <stop offset="1" stop-color="#D7C19C"/>
    </linearGradient>
    <pattern id="px" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect x="0" y="0" width="2" height="2" fill="rgba(0,0,0,0.06)"/>
      <rect x="4" y="2" width="2" height="2" fill="rgba(0,0,0,0.05)"/>
      <rect x="2" y="6" width="2" height="2" fill="rgba(0,0,0,0.04)"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#px)" opacity="0.8"/>

  <!-- window -->
  <rect x="140" y="170" width="744" height="620" rx="22" fill="rgba(255,255,255,0.65)" stroke="rgba(0,0,0,0.25)" stroke-width="10"/>
